<header class="site-header">
  <div class="bar">
    <a routerLink="/" class="brand">
      <span class="brand-kicker">FIFA World Cup 2026</span>
      <span class="brand-title">World Cup <em>Pool</em></span>
    </a>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Leaderboard
      </a>
      <a routerLink="/schedule" routerLinkActive="active">Schedule</a>
      <a routerLink="/my-picks" routerLinkActive="active">My Picks</a>
      <a routerLink="/admin" routerLinkActive="active">Admin</a>
    </nav>
  </div>
</header>

<main class="site-main">
  @if (data.error()) {
    <p class="banner banner-error">{{ data.error() }}</p>
  }
  <router-outlet />
</main>

<footer class="site-footer">
  <span>$50 Entry · Group 1 · R32 2 · R16 3 · QF 4 · SF 5 · Final 6 pts</span>
</footer>
